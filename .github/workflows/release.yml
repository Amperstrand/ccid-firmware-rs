name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.0.1)'
        required: true

env:
  CARGO_TERM_COLOR: always
  SOURCE_DATE_EPOCH: 1704067200

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        profile: [profile-cherry-st2100, profile-gemalto-plain, profile-gemalto-pinpad]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract profile suffix
        id: profile
        run: |
          # Extract suffix: profile-cherry-st2100 -> cherry-st2100
          SUFFIX="${{ matrix.profile }}"
          SUFFIX="${SUFFIX#profile-}"
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT
      
      - name: Build in Docker (reproducible)
        run: |
          docker build \
            --build-arg PROFILE=${{ matrix.profile }} \
            -t ccid-firmware-builder-${{ steps.profile.outputs.suffix }} \
            .
          
          # Create container and extract firmware
          docker create --name extract-${{ steps.profile.outputs.suffix }} ccid-firmware-builder-${{ steps.profile.outputs.suffix }}
          docker cp extract-${{ steps.profile.outputs.suffix }}:/app/target/thumbv7em-none-eabihf/release/ccid-firmware ./ccid-firmware-${{ steps.profile.outputs.suffix }}.elf
          docker rm extract-${{ steps.profile.outputs.suffix }}
      
      - name: Generate release artifacts
        run: |
          SUFFIX="${{ steps.profile.outputs.suffix }}"
          
          # Convert to binary format (only format needed for flashing)
          arm-none-eabi-objcopy -O binary ccid-firmware-$SUFFIX.elf ccid-firmware-$SUFFIX.bin
          
          # Display checksum for verification
          echo "## Release Checksum (${{ matrix.profile }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          sha256sum ccid-firmware-$SUFFIX.bin >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Verify reproducibility
        run: |
          SUFFIX="${{ steps.profile.outputs.suffix }}"
          
          echo "Building twice to verify reproducibility for ${{ matrix.profile }}..."
          
          # Clean and rebuild in Docker
          docker build \
            --no-cache \
            --build-arg PROFILE=${{ matrix.profile }} \
            -t ccid-firmware-builder-verify-$SUFFIX \
            .
          
          # Extract ELF and convert to binary
          docker create --name extract-verify-$SUFFIX ccid-firmware-builder-verify-$SUFFIX
          docker cp extract-verify-$SUFFIX:/app/target/thumbv7em-none-eabihf/release/ccid-firmware ./ccid-firmware-verify-$SUFFIX.elf
          docker rm extract-verify-$SUFFIX
          arm-none-eabi-objcopy -O binary ccid-firmware-verify-$SUFFIX.elf ccid-firmware-verify-$SUFFIX.bin

          # Compare checksums
          SHA1=$(sha256sum ccid-firmware-$SUFFIX.bin | cut -d' ' -f1)
          SHA2=$(sha256sum ccid-firmware-verify-$SUFFIX.bin | cut -d' ' -f1)
          
          echo "Build 1 (${{ matrix.profile }}): $SHA1"
          echo "Build 2 (${{ matrix.profile }}): $SHA2"
          
          if [ "$SHA1" = "$SHA2" ]; then
            echo "✅ Reproducibility verified for ${{ matrix.profile }} - both builds identical" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Reproducibility check failed for ${{ matrix.profile }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Collect release assets
        run: |
          SUFFIX="${{ steps.profile.outputs.suffix }}"
          mkdir -p dist
          cp ccid-firmware-$SUFFIX.bin dist/
          cd dist && sha256sum ccid-firmware-$SUFFIX.bin > SHA256SUMS-${{ matrix.profile }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.profile }}
          path: dist/*

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: firmware-*
          merge-multiple: true
      
      - name: Prepare release assets
        run: |
          cd release-assets
          # Combine all SHA256SUMS into one file
          cat SHA256SUMS-* > SHA256SUMS
          rm SHA256SUMS-*
          
          # Display combined checksums
          echo "## All Release Checksums" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat SHA256SUMS >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Write release notes to file
          cat > release-notes.md << 'NOTES'
          ## STM32 CCID Firmware Release
          
          This release includes firmware for **three device profiles**:
          
          | Profile | Device | VID:PID | Features |
          |---------|--------|---------|----------|
          | `cherry-st2100` | Cherry SmartTerminal ST-2100 | `046a:003e` | PIN pad |
          | `gemalto-plain` | Gemalto IDBridge CT30 | `08e6:3437` | Basic |
          | `gemalto-pinpad` | Gemalto IDBridge K30 | `08e6:3437` | PIN pad |
          
          ### Files per Profile
          
           Each profile includes:
           | File | Description | Size |
           |------|-------------|------|
           | `ccid-firmware-{profile}.bin` | Raw binary for direct flash | ~44KB |
           | `SHA256SUMS-{profile}` | SHA256 checksums for verification | - |
          
          ### Flash Instructions
          
          **probe-rs (recommended)**
          ```bash
          # Replace {profile} with: cherry-st2100, gemalto-plain, or gemalto-pinpad
          probe-rs run --chip STM32F469NIHx ccid-firmware-{profile}.bin
          ```
          
           **st-flash**
           ```bash
           st-flash write ccid-firmware-{profile}.bin 0x08000000
           ```
           
           ### Reproducibility
          
          All profiles were built in Docker with:
          - `SOURCE_DATE_EPOCH=1704067200`
          - Pinned Rust toolchain (see `rust-toolchain.toml`)
          
          To reproduce a build locally:
          ```bash
          git clone https://github.com/Amperstrand/ccid-firmware-rs.git
          cd ccid-firmware-rs
          
           # Build specific profile
           docker build --build-arg PROFILE=profile-cherry-st2100 -t ccid-builder .
           docker create --name extract ccid-builder
           docker cp extract:/app/target/thumbv7em-none-eabihf/release/ccid-firmware ./ccid-firmware-cherry-st2100.bin
           sha256sum ccid-firmware-cherry-st2100.bin
           ```
           
           Compare the SHA256 with the SHA256SUMS-{profile} file from this release.
          NOTES
          
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/* \
            --title "${GITHUB_REF_NAME}: STM32 CCID Firmware" \
            --notes-file release-notes.md

  reproducibility-report:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          echo "## Reproducibility Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This release was built with:" >> $GITHUB_STEP_SUMMARY
          echo "- Docker container for isolation" >> $GITHUB_STEP_SUMMARY
          echo "- SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pinned Rust toolchain via rust-toolchain.toml" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All three profiles verified reproducible:" >> $GITHUB_STEP_SUMMARY
          echo "- profile-cherry-st2100" >> $GITHUB_STEP_SUMMARY
          echo "- profile-gemalto-plain" >> $GITHUB_STEP_SUMMARY
          echo "- profile-gemalto-pinpad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To reproduce a build locally:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Build specific profile" >> $GITHUB_STEP_SUMMARY
          echo "docker build --build-arg PROFILE=profile-cherry-st2100 -t ccid-builder ." >> $GITHUB_STEP_SUMMARY
          echo "docker create --name extract ccid-builder" >> $GITHUB_STEP_SUMMARY
          echo "docker cp extract:/app/target/thumbv7em-none-eabihf/release/ccid-firmware ./ccid-firmware.bin" >> $GITHUB_STEP_SUMMARY
          echo "sha256sum ccid-firmware.bin" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
