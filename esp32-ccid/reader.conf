# pcscd serial reader configuration for ESP32 + PN532 GemPC Twin emulator
#
# Install to: /etc/reader.conf.d/GemPCTwin.conf
# Then restart pcscd: sudo systemctl restart pcscd
#
# Verify: pcsc_scan
#
# This tells pcscd to use libccidtwin.so for serial communication with the
# ESP32 firmware emulating a GemPC Twin CCID reader over USB-UART.

FRIENDLYNAME      "GemPCTwin serial"
DEVICENAME        /dev/ttyUSB0
LIBPATH           /usr/lib/pcsc/drivers/serial/libccidtwin.so
CHANNELID         0x00000001
