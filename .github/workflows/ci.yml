name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build firmware
        run: cargo build --release --target thumbv7em-none-eabihf
      
      - name: Generate binary artifacts
        run: |
          cargo objcopy --release --target thumbv7em-none-eabihf -- \
            -O binary ccid-firmware.bin
          cargo objcopy --release --target thumbv7em-none-eabihf -- \
            -O ihex ccid-firmware.hex
          sha256sum ccid-firmware.bin > ccid-firmware.bin.sha256
          sha256sum ccid-firmware.hex > ccid-firmware.hex.sha256
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ccid-firmware.bin
            ccid-firmware.hex
            ccid-firmware.bin.sha256
            ccid-firmware.hex.sha256

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run unit tests
        run: cargo test --target x86_64-unknown-linux-gnu
      
      - name: Check Python syntax
        run: |
          python3 -m py_compile test_*.py || true

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
      - name: Check formatting
        run: cargo fmt --check || true
      
      - name: Run clippy
        run: cargo clippy --target thumbv7em-none-eabihf -- -D warnings || true
