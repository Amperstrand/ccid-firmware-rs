[package]
edition = "2021"
name = "mfrc522"
version = "0.8.0"
description = "Vendored MFRC522 driver — patched for esp32-ccid (timer, register access)"

[lib]
name = "mfrc522"
path = "src/lib.rs"

[dependencies.embedded-hal-02]
version = "0.2"
optional = true
