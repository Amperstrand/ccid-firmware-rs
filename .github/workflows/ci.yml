name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: thumbv7em-none-eabihf

      - name: Install cargo-binutils
        run: |
          rustup component add llvm-tools
          cargo install cargo-binutils

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build firmware
        run: cargo build --release
      
      - name: Generate binary artifacts
        run: |
          cargo objcopy --release -- \
            -O binary ccid-firmware.bin
          cargo objcopy --release -- \
            -O ihex ccid-firmware.hex
          sha256sum ccid-firmware.bin > ccid-firmware.bin.sha256
          sha256sum ccid-firmware.hex > ccid-firmware.hex.sha256
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ccid-firmware.bin
            ccid-firmware.hex
            ccid-firmware.bin.sha256
            ccid-firmware.hex.sha256

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: thumbv7em-none-eabihf
          components: rustfmt, clippy
      
      - name: Check formatting
        run: cargo fmt --check || true
      
      - name: Run clippy
        run: cargo clippy -- -D warnings || true

      - name: Check Python syntax
        run: |
          python3 -m py_compile test_*.py || true
