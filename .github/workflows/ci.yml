name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile: [profile-cherry-smartterminal-st2xxx, profile-gemalto-idbridge-ct30, profile-gemalto-idbridge-k30]
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: thumbv7em-none-eabihf

      - name: Install cargo-binutils
        run: |
          rustup component add llvm-tools
          cargo install cargo-binutils

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build firmware
        run: |
          if [[ "${{ matrix.profile }}" == "profile-cherry-smartterminal-st2xxx" ]]; then
            cargo build --release
          else
            cargo build --release --no-default-features --features ${{ matrix.profile }}
          fi
      
      - name: Generate binary artifacts
        run: |
          if [[ "${{ matrix.profile }}" == "profile-cherry-smartterminal-st2xxx" ]]; then
            cargo objcopy --release -- \
              -O binary ccid-firmware.bin
            cargo objcopy --release -- \
              -O ihex ccid-firmware.hex
          else
            cargo objcopy --release --no-default-features --features ${{ matrix.profile }} -- \
              -O binary ccid-firmware.bin
            cargo objcopy --release --no-default-features --features ${{ matrix.profile }} -- \
              -O ihex ccid-firmware.hex
          fi
          sha256sum ccid-firmware.bin > ccid-firmware.bin.sha256
          sha256sum ccid-firmware.hex > ccid-firmware.hex.sha256
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.profile }}
          path: |
            ccid-firmware.bin
            ccid-firmware.hex
            ccid-firmware.bin.sha256
            ccid-firmware.hex.sha256

  lint:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: thumbv7em-none-eabihf
          components: rustfmt, clippy
      
      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check Python syntax
        run: |
          python3 -m py_compile tests/hardware/*.py

  test:
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92"
          targets: x86_64-unknown-linux-gnu
      
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test
