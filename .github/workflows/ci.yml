name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Run Rust library unit tests (host-only)
        run: cargo test --target x86_64-unknown-linux-gnu --lib

      - name: Check Python helper syntax
        run: python3 -m py_compile test_ccid_apdu.py test_seedkeeper.py test_gemalto_pysatochip.py tests/hardware/seedkeeper_non_destructive.py tests/hardware/sysmocom_sim_non_destructive.py
