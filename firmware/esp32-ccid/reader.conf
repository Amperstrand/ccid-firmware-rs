# pcscd serial reader configuration for ESP32 + MFRC522 GemPC Twin emulator
#
# Install to: /etc/reader.conf.d/GemPCTwin.conf
# Then restart pcscd: sudo systemctl restart pcscd
#
# Verify: pcsc_scan
#
# Uses stable by-id symlink so device enumeration order doesn't matter.
# Adjust the serial number in the path to match your M5Stack device.

FRIENDLYNAME      "GemPCTwin serial"
DEVICENAME        /dev/serial/by-id/usb-M5STACK_Inc._M5_Serial_Converter_81528A13B6-if00-port0
LIBPATH           /usr/lib/pcsc/drivers/serial/libccidtwin.so
CHANNELID         0x00000001
